{% extends "base.html" %}

{% block title %}새 글 작성 - 개인 SNS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="p-4 p-md-5">
                <div class="mb-4">
                    <h3 class="fw-bold text-main" style="letter-spacing: -0.03em;">새로운 이야기 공유</h3>
                    <p class="text-muted">무엇을 공유하고 싶으신가요?</p>
                </div>

                <form method="POST" enctype="multipart/form-data" id="postForm">
                    <div class="mb-4 position-relative">
                        <textarea class="form-control border-light-subtle pb-4" id="content" name="content" rows="8" 
                                  style="font-size: 1.1rem; border-radius: 12px; transition: var(--transition); resize: none;"
                                  placeholder="내용을 입력하세요 (URL 포함 시 미리보기가 자동 생성됩니다)"></textarea>
                        <div id="char-counter" class="position-absolute bottom-0 end-0 p-3 small text-muted font-monospace">0 / 2000</div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="p-5 rounded-4 bg-light text-center transition-transform" style="border: 2px dashed var(--bs-border-color); position: relative; cursor: pointer;">
                            <input type="file" class="position-absolute top-0 start-0 w-100 h-100 opacity-0" id="files" name="files" multiple style="cursor: pointer; z-index: 2;">
                            <i class="bi bi-cloud-arrow-up display-4 text-primary opacity-75 mb-3"></i>
                            <h6 class="fw-bold mb-2">여기를 클릭하여 파일을 추가하세요</h6>
                            <p class="text-muted small mb-0"><strong class="text-main fw-bold">최대 30개 (대용량 지원)</strong>까지 첨부 가능</p>
                            <div id="fileList" class="mt-3 text-start small text-secondary d-none position-relative" style="z-index: 3;"></div>
                        </div>
                    </div>
                    
                    <div class="mb-5 px-2 d-flex align-items-center">
                        <div class="form-check form-switch d-flex align-items-center gap-2 m-0 p-0">
                            <input class="form-check-input mt-0" type="checkbox" id="is_public" name="is_public" checked style="width: 2.8em; height: 1.4em; cursor: pointer; margin-left: 0;">
                            <label class="form-check-label fw-medium ms-2" for="is_public" style="cursor: pointer; padding-top: 2px;">
                                <i class="bi bi-globe me-1 text-primary"></i> 공개 게시
                            </label>
                        </div>
                    </div>
                    
                    <!-- 업로드 프로그레스 바 -->
                    <div id="uploadProgressContainer" class="mb-4 d-none p-4 rounded-4 border border-primary border-opacity-10 bg-primary bg-opacity-10">
                        <div class="d-flex justify-content-between mb-2">
                            <span id="uploadStatusText" class="small fw-bold text-primary">클라우드에 전송 중...</span>
                            <span id="uploadPercentage" class="small fw-bold text-primary">0%</span>
                        </div>
                        <div class="progress" style="height: 6px; background-color: rgba(255,255,255,0.5);">
                            <div id="progressBar" class="progress-bar progress-bar-animated" 
                                 role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-end align-items-center gap-3 pt-4 border-top border-light">
                        <a href="{{ url_for('main.index') }}" class="btn btn-light text-muted fw-bold px-4 py-2" id="cancelBtn" style="border-radius: 10px;">
                            취소
                        </a>
                        <button type="submit" class="btn btn-primary px-4 py-2 shadow-sm" id="submitBtn" style="border-radius: 10px;">
                            <i class="bi bi-send-fill me-2"></i> 게시글 완성하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// 실시간 글자 수 카운터
const textarea = document.getElementById('content');
const counter = document.getElementById('char-counter');
const maxLength = 2000;

function updateCounter() {
    const currentLength = textarea.value.length;
    if (currentLength > maxLength) {
        counter.innerHTML = `<span class="text-danger fw-bold">${currentLength} / ${maxLength} (초과)</span>`;
        textarea.value = textarea.value.substring(0, maxLength);
    } else {
        counter.innerText = `${currentLength} / ${maxLength}`;
    }
}
textarea.addEventListener('input', updateCounter);
// 초기 화면에서도 카운터 적용
updateCounter();

// 파일 목록 동적 표시
document.getElementById('files').addEventListener('change', function(e) {
    const fileListObj = document.getElementById('fileList');
    if (this.files.length > 0) {
        fileListObj.classList.remove('d-none');
        let fileNames = Array.from(this.files).map(f => `<i class="bi bi-file-earmark me-2"></i>${f.name}`).join('<br>');
        fileListObj.innerHTML = `<div class="p-3 bg-white rounded-3 border border-light mt-2" style="max-height: 120px; overflow-y: auto;">
                                    <strong class="d-block mb-2 text-dark border-bottom border-light pb-1">선택된 첨부파일 (${this.files.length}개)</strong>
                                    <div class="text-dark" style="line-height: 1.6;">${fileNames}</div>
                                 </div>`;
    } else {
        fileListObj.classList.add('d-none');
        fileListObj.innerHTML = '';
    }
});

// 폼 제출 처리 (브라우저 직접 업로드 방식)
document.getElementById('postForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const form = this;
    const fileInput = document.getElementById('files');
    const files = Array.from(fileInput.files);
    
    if (files.length > 30) {
        alert('한 번에 최대 30개의 파일만 업로드할 수 있습니다.');
        return;
    }
    
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const progressContainer = document.getElementById('uploadProgressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('uploadPercentage');
    const statusText = document.getElementById('uploadStatusText');
    const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    
    // UI 업데이트: 버튼 비활성화 및 프로그레스 바 표시
    submitBtn.disabled = true;
    cancelBtn.classList.add('disabled');
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 처리 중...';
    progressContainer.classList.remove('d-none');
    
    const uploadedFilesData = [];
    
    try {
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            statusText.innerText = `[${i+1}/${files.length}] ${file.name} 준비 중...`;
            
            // 1. 서버를 통해 업로드 세션(Session URI) 생성
            const initRes = await fetch('/api/upload/init', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ filename: file.name, mimetype: file.type })
            });
            const initData = await initRes.json();
            if (!initData.success) throw new Error(initData.error || '업로드 세션 생성에 실패했습니다.');
            
            const uploadUrl = initData.upload_url;
            
            // 2. 구글 서버로 직접 파일 조각 전송 (PUT)
            const fileId = await new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', uploadUrl, true);
                
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const filePercent = Math.round((e.loaded / e.total) * 100);
                        const overallPercent = Math.round(((i / files.length) * 100) + (filePercent / files.length));
                        progressBar.style.width = overallPercent + '%';
                        progressBar.setAttribute('aria-valuenow', overallPercent);
                        progressPercent.innerText = overallPercent + '%';
                        statusText.innerText = `[${i+1}/${files.length}] ${file.name} 전송 중... (${filePercent}%)`;
                    }
                };
                
                xhr.onload = () => {
                    if (xhr.status === 200 || xhr.status === 201) {
                        // 구글은 업로드 완료 후 파일 메타데이터를 반환함
                        const response = JSON.parse(xhr.responseText);
                        resolve(response.id);
                    } else {
                        reject(new Error(`구글 업로드 오류 (${xhr.status})`));
                    }
                };
                xhr.onerror = () => reject(new Error('네트워크 오류가 발생했습니다.'));
                xhr.send(file);
            });
            
            // 3. 서버에 업로드 완료 보고 및 공개 권한 설정 요청
            statusText.innerText = `[${i+1}/${files.length}] 권한 설정 및 정보 확인 중...`;
            const completeRes = await fetch('/api/upload/complete', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrfToken
                },
                body: JSON.stringify({ file_id: fileId })
            });
            const completeData = await completeRes.json();
            if (!completeData.success) throw new Error('파일 완료 처리 중 오류가 발생했습니다.');
            
            uploadedFilesData.push(completeData.file);
        }
        
        // 4. 최종 게시글 정보와 함께 서버에 제출
        statusText.innerText = '게시글을 저장하는 중입니다...';
        progressBar.style.width = '100%';
        progressPercent.innerText = '100%';
        
        const formData = new FormData(form);
        formData.append('uploaded_files', JSON.stringify(uploadedFilesData));
        // 이미 업로드 완료했으므로 실제 파일 필드는 비움
        formData.delete('files'); 
        
        const finalRes = await fetch(form.action || window.location.href, {
            method: 'POST',
            headers: { 
                'X-Requested-With': 'XMLHttpRequest',
                'X-CSRFToken': csrfToken
            },
            body: formData
        });
        
        const finalData = await finalRes.json();
        if (finalData.success && finalData.redirect) {
            window.location.href = finalData.redirect;
        } else {
            throw new Error(finalData.error || '게시글 저장에 실패했습니다.');
        }
        
    } catch (err) {
        console.error(err);
        alert('오류: ' + err.message);
        submitBtn.disabled = false;
        cancelBtn.classList.remove('disabled');
        submitBtn.innerHTML = '<i class="bi bi-send-fill me-2"></i> 게시글 완성하기';
        progressContainer.classList.add('d-none');
    }
});
</script>
{% endblock %}
