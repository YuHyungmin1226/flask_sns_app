{% extends "base.html" %}

{% block title %}새 글 작성 - 개인 SNS{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
            <div class="p-4 p-md-5">
                <div class="mb-4">
                    <h3 class="fw-bold text-main" style="letter-spacing: -0.03em;">새로운 이야기 공유</h3>
                    <p class="text-muted">무엇을 공유하고 싶으신가요?</p>
                </div>

                <form method="POST" enctype="multipart/form-data" id="postForm">
                    <div class="mb-4">
                        <textarea class="form-control border-light-subtle" id="content" name="content" rows="8" 
                                  style="font-size: 1.1rem; border-radius: 12px; transition: var(--transition);"
                                  placeholder="내용을 입력하세요 (URL 포함 시 미리보기가 자동 생성됩니다)"></textarea>
                    </div>
                    
                    <div class="mb-4 p-4 rounded-4 bg-light bg-opacity-50 border border-light">
                        <label for="files" class="form-label fw-semibold mb-2">
                            <i class="bi bi-paperclip me-1"></i> 파일 첨부
                        </label>
                        <input type="file" class="form-control border-0 shadow-none bg-white" id="files" name="files" multiple style="border-radius: 10px;">
                        <div class="form-text mt-2 small">
                            <i class="bi bi-info-circle me-1"></i> 
                            이미지, 영상 등 <strong class="text-main fw-bold">최대 30개(총 300MB)</strong>까지 첨부 가능합니다.
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="form-check form-switch p-0 d-flex align-items-center gap-3">
                            <input class="form-check-input ms-0 mt-0" type="checkbox" id="is_public" name="is_public" checked style="width: 3em; height: 1.5em; cursor: pointer;">
                            <label class="form-check-label fw-medium" for="is_public" style="cursor: pointer;">
                                <i class="bi bi-globe me-1"></i> 공개로 게시함
                            </label>
                        </div>
                    </div>
                    
                    <!-- 업로드 프로그레스 바 -->
                    <div id="uploadProgressContainer" class="mb-4 d-none p-4 rounded-4 border border-primary border-opacity-10 bg-primary bg-opacity-10">
                        <div class="d-flex justify-content-between mb-2">
                            <span id="uploadStatusText" class="small fw-bold text-primary">클라우드에 전송 중...</span>
                            <span id="uploadPercentage" class="small fw-bold text-primary">0%</span>
                        </div>
                        <div class="progress" style="height: 6px; background-color: rgba(255,255,255,0.5);">
                            <div id="progressBar" class="progress-bar progress-bar-animated" 
                                 role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center pt-3 border-top border-light">
                        <a href="{{ url_for('index') }}" class="btn btn-link text-muted text-decoration-none fw-medium" id="cancelBtn">
                            <i class="bi bi-arrow-left me-1"></i> 취소
                        </a>
                        <button type="submit" class="btn btn-primary px-4 py-2" id="submitBtn" style="border-radius: 10px;">
                            <i class="bi bi-send-fill me-2"></i> 게시글 완성하기
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// 실시간 글자 수 카운터
document.getElementById('content').addEventListener('input', function() {
    const maxLength = 2000;
    const currentLength = this.value.length;
    const remaining = maxLength - currentLength;
    
    let counter = document.getElementById('char-counter');
    if (!counter) {
        counter = document.createElement('div');
        counter.id = 'char-counter';
        counter.className = 'form-text';
        this.parentNode.appendChild(counter);
    }
    
    if (remaining < 0) {
        counter.innerHTML = `<span class="text-danger">글자 수 초과: ${Math.abs(remaining)}자</span>`;
    } else {
        counter.innerHTML = `글자 수: ${currentLength}/${maxLength}`;
    }
});

// 폼 제출 처리 (비동기 업로드)
document.getElementById('postForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const form = this;
    const fileInput = document.getElementById('files');
    
    // 파일 개수 체크 (프론트엔드)
    if (fileInput.files.length > 30) {
        alert('한 번에 최대 30개의 파일만 업로드할 수 있습니다.');
        return;
    }
    
    const formData = new FormData(form);
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const progressContainer = document.getElementById('uploadProgressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressPercent = document.getElementById('uploadPercentage');
    const statusText = document.getElementById('uploadStatusText');
    
    // UI 업데이트: 버튼 비활성화 및 프로그레스 바 표시
    submitBtn.disabled = true;
    cancelBtn.classList.add('disabled');
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> 처리 중...';
    progressContainer.classList.remove('d-none');
    
    const xhr = new XMLHttpRequest();
    
    // 업로드 진행 이벤트
    xhr.upload.onprogress = function(e) {
        if (e.lengthComputable) {
            const percentComplete = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = percentComplete + '%';
            progressBar.setAttribute('aria-valuenow', percentComplete);
            progressPercent.innerText = percentComplete + '%';
            
            if (percentComplete === 100) {
                statusText.innerText = '서버에서 처리 중... 잠시만 기다려 주세요.';
                progressBar.classList.add('bg-success');
            }
        }
    };
    
    // 완료 처리
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                const response = JSON.parse(xhr.responseText);
                if (response.success && response.redirect) {
                    window.location.href = response.redirect;
                } else {
                    location.reload(); // 폴백
                }
            } catch (err) {
                window.location.href = '/'; // 기본 이동
            }
        } else {
            alert('게시글 저장 중 오류가 발생했습니다.');
            submitBtn.disabled = false;
            cancelBtn.classList.remove('disabled');
            submitBtn.innerHTML = '<i class="bi bi-send"></i> 게시하기';
            progressContainer.classList.add('d-none');
        }
    };
    
    // 에러 처리
    xhr.onerror = function() {
        alert('네트워크 오류가 발생했습니다.');
        submitBtn.disabled = false;
        cancelBtn.classList.remove('disabled');
        submitBtn.innerHTML = '<i class="bi bi-send"></i> 게시하기';
        progressContainer.classList.add('d-none');
    };
    
    xhr.open('POST', form.action, true);
    xhr.setRequestHeader('X-Requested-With', 'XMLHttpRequest');
    xhr.send(formData);
});
</script>
{% endblock %}
